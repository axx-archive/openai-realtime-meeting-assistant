services:
  meetingassist:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - meeting_data:/app/data
    ports:
      - "40000-40100:40000-40100/udp"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - meetingassist
    env_file:
      - .env
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  meeting_data:
