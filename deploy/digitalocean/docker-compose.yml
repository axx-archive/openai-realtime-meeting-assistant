services:
  meetingassist:
    build:
      context: ../..
      dockerfile: Dockerfile
    # .env carries every runtime key into the app container, including the
    # OPS-3 Fable activation set (ANTHROPIC_API_KEY, BONFIRE_AGENT_RUNNER,
    # BONFIRE_ORCHESTRATOR_*/BONFIRE_DELIVERABLE_* dials). Do not move those
    # into an `environment:` block here — .env is the single source of truth.
    env_file:
      - .env
    environment:
      BONFIRE_CODEX_QUEUE_PATH: /app/codex-queue/jobs
      BONFIRE_CODEX_HEARTBEAT_PATH: /app/codex-queue/heartbeat.json
    volumes:
      - meeting_data:/app/data
      # Cost/eval books are isolated into their own volume so the Codex
      # sidecar can append usage without receiving the company-brain volume.
      # The mount stays nested under /app/data so normal backups include it.
      - usage_ledger:/app/data/usage
      - codex_queue:/app/codex-queue
    ports:
      - "40000-40100:40000-40100/udp"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Rides both networks: the egress-less render_internal leg exists ONLY so
    # the render sidecar can POST its callback here.
    networks:
      - default
      - render_internal
    depends_on:
      canonical-postgres:
        condition: service_healthy
    restart: unless-stopped

  # W1 canonical shadow target. It is deliberately private to the Compose
  # network and resource-capped for the W1 droplet. W4 may replace
  # this with managed HA PostgreSQL after its separate cost/DR gate.
  canonical-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bonfire
      POSTGRES_USER: bonfire
      POSTGRES_PASSWORD: ${BONFIRE_CANONICAL_POSTGRES_PASSWORD:?BONFIRE_CANONICAL_POSTGRES_PASSWORD is required}
    command:
      - postgres
      - -c
      - max_connections=30
      - -c
      - shared_buffers=64MB
      - -c
      - effective_cache_size=128MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
    volumes:
      - canonical_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bonfire -d bonfire"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    mem_limit: 256m
    shm_size: 64m
    restart: unless-stopped

  codex-runner:
    profiles: ["codex"]
    build:
      context: ../..
      dockerfile: Dockerfile
      target: codex-runner
    image: meetingassist-codex-runner:codex-0.144.1
    # Explicit allowlist: this execution sidecar does not inherit app mail,
    # calendar, Anthropic, fiscal, or other production-service credentials.
    environment:
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BONFIRE_RUNNER_TOKEN: ${BONFIRE_RUNNER_TOKEN:?BONFIRE_RUNNER_TOKEN is required}
      BONFIRE_CODEX_MODEL: ${BONFIRE_CODEX_MODEL:?BONFIRE_CODEX_MODEL must be pinned}
      BONFIRE_CODEX_CWD: /workspace/meetingassist
      BONFIRE_CODEX_QUEUE_PATH: /app/codex-queue/jobs
      BONFIRE_CODEX_HEARTBEAT_PATH: /app/codex-queue/heartbeat.json
      BONFIRE_RUNNER_CALLBACK_URL: http://meetingassist:3000/internal/codex/jobs/result
      BONFIRE_CODEX_SANDBOX: workspace-write
      BONFIRE_CODEX_APPROVAL_POLICY: never
      BONFIRE_CODEX_REASONING_EFFORT: high
      BONFIRE_CODEX_EXTERNAL_WRITE_ENABLED: ${BONFIRE_CODEX_EXTERNAL_WRITE_ENABLED:-false}
      BONFIRE_CODEX_EPHEMERAL: "true"
      USAGE_LEDGER_PATH: /app/usage-ledger
    volumes:
      - codex_queue:/app/codex-queue
      - usage_ledger:/app/usage-ledger
      - ${BONFIRE_CODEX_WORKSPACE_HOST_PATH:-../..}:/workspace/meetingassist
      - ${BONFIRE_CODEX_WORKSPACE_HOST_PATH:-../..}/.git:/workspace/meetingassist/.git:ro
      - codex_runner_data:/runner-data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    pids_limit: 256
    depends_on:
      meetingassist:
        condition: service_healthy
    restart: unless-stopped

  render-runner:
    profiles: ["render"]
    build:
      context: ../..
      dockerfile: Dockerfile.render
    # Mirrors the codex-runner sidecar: same .env (BONFIRE_RUNNER_TOKEN is the
    # shared callback credential), same meeting_data volume so the file-per-job
    # queue at /app/data/render-jobs and the exported PDFs/page JPEGs are
    # visible to both containers. The result route below lands in stage B;
    # until then the profile simply stays off.
    env_file:
      - .env
    environment:
      BONFIRE_RENDER_QUEUE_PATH: /app/data/render-jobs
      BONFIRE_RENDER_CALLBACK_URL: http://meetingassist:3000/internal/render/jobs/result
    volumes:
      - meeting_data:/app/data
    # Docker's default seccomp profile SIGTRAPs modern chromium (first live
    # run, 2026-07-05: every export died "trace/breakpoint trap"). Unconfined
    # seccomp is the accepted fix for containerized chromium HERE because this
    # container's blast radius is already bounded by the network isolation
    # below — no egress, nothing to pivot to but the callback endpoint.
    security_opt:
      - seccomp:unconfined
    # Untrusted artifact HTML executes in this container's chromium with
    # --no-sandbox, so the container itself is confined to the internal-only
    # network: it can reach meetingassist:3000 for the callback and NOTHING
    # else — no internet egress, no coturn, no host metadata services.
    networks:
      - render_internal
    depends_on:
      meetingassist:
        condition: service_healthy
    restart: unless-stopped

  coturn:
    image: coturn/coturn:4.6
    command:
      - -n
      - --log-file=stdout
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${MEETING_TURN_SECRET:-meetingassist-dev-turn-secret}
      - --realm=${MEETING_TURN_REALM:-thebonfire.xyz}
      - --external-ip=${PION_NAT1TO1_IP:-146.190.171.224}
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --no-cli
      - --no-multicast-peers
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - meetingassist
    env_file:
      - .env
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

networks:
  # internal: true blocks all egress beyond the network itself — the render
  # sidecar's whole world is the app container's callback route.
  render_internal:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  # Explicit external names protect migrated operational history from an
  # accidental `docker compose down -v` and make the cutover invariant clear.
  codex_queue:
    external: true
    name: digitalocean_codex_queue
  codex_runner_data:
  meeting_data:
  usage_ledger:
    external: true
    name: digitalocean_usage_ledger
  canonical_postgres:
    external: true
    name: digitalocean_canonical_postgres
