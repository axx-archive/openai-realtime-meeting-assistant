services:
  meetingassist:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - meeting_data:/app/data
    ports:
      - "40000-40100:40000-40100/udp"
    restart: unless-stopped

  coturn:
    image: coturn/coturn:4.6
    command:
      - -n
      - --log-file=stdout
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${MEETING_TURN_SECRET:-meetingassist-dev-turn-secret}
      - --realm=${MEETING_TURN_REALM:-thebonfire.xyz}
      - --external-ip=${PION_NAT1TO1_IP:-146.190.171.224}
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --no-cli
      - --no-multicast-peers
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - meetingassist
    env_file:
      - .env
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  meeting_data:
