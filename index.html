<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Bonfire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
    <style>
      :root {
        color-scheme: dark;

        /* ---------- Ember (primary brand) ---------- */
        --ember-50:  #FFF1E3;
        --ember-100: #FFD9B0;
        --ember-200: #FFC082;
        --ember-300: #FFA463;
        --ember-400: #FF8A3D;
        --ember-500: #FF7A2B;
        --ember-600: #ED5A14;
        --ember-700: #C13E07;
        --ember-800: #8B2A04;

        --amber-300: #FFD27A;
        --amber-500: #FFB23F;

        /* ---------- Warm darks ---------- */
        --night-0: #0B0805;
        --night-1: #110D09;
        --night-2: #15110D;
        --night-3: #1D1814;
        --night-4: #2A231C;
        --night-5: #3A3127;

        /* ---------- Warm lights ---------- */
        --ash-50:  #FAF6EE;
        --ash-100: #F2ECDD;
        --ash-200: #E6DDC6;
        --ash-500: #948876;
        --ash-600: #6E6457;
        --ash-700: #4D4538;

        /* ---------- Foreground ---------- */
        --fg-0: #FAF5EC;
        --fg-1: #D9D0BF;
        --fg-2: #948876;
        --fg-3: #5D5448;
        --fg-inverse: #1B130A;

        /* ---------- Hairlines ---------- */
        --line-faint:  rgba(255, 235, 200, 0.06);
        --line:        rgba(255, 235, 200, 0.10);
        --line-strong: rgba(255, 235, 200, 0.16);
        --line-light:  #EAE1CF;

        /* ---------- Semantic ---------- */
        --success:    #5FBE7A;
        --success-bg: rgba(95, 190, 122, 0.14);
        --warning:    #FFB23F;
        --danger:     #E5573E;
        --danger-bg:  rgba(229, 87, 62, 0.14);
        --info:       #88A8FF;
        --info-bg:    rgba(136, 168, 255, 0.14);

        /* ---------- Type ---------- */
        --font-display: "Instrument Serif", "Cormorant Garamond", "Times New Roman", serif;
        --font-sans:    "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        --font-mono:    "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

        /* ---------- Radii ---------- */
        --r-xs: 4px;
        --r-sm: 6px;
        --r-md: 10px;
        --r-lg: 14px;
        --r-pill: 999px;

        /* ---------- Spacing ---------- */
        --s-1:  4px;
        --s-2:  8px;
        --s-3:  12px;
        --s-4:  16px;
        --s-5:  20px;
        --s-6:  24px;

        /* ---------- Shadows ---------- */
        --shadow-1: 0 1px 2px rgba(15, 8, 2, 0.45);
        --shadow-2: 0 6px 18px rgba(15, 8, 2, 0.45), 0 1px 2px rgba(15, 8, 2, 0.55);
        --shadow-3: 0 24px 60px rgba(15, 8, 2, 0.55), 0 4px 12px rgba(15, 8, 2, 0.45);
        --shadow-light-1: 0 1px 2px rgba(60, 35, 10, 0.06);
        --shadow-light-2: 0 8px 24px rgba(60, 35, 10, 0.10), 0 1px 2px rgba(60, 35, 10, 0.06);

        --glow-ember-sm: 0 0 0 1px rgba(255, 122, 43, 0.45), 0 0 16px rgba(255, 122, 43, 0.25);
        --glow-ember-md: 0 0 0 1px rgba(255, 122, 43, 0.55), 0 0 28px rgba(255, 122, 43, 0.35), 0 0 64px rgba(255, 122, 43, 0.15);

        /* ---------- Motion ---------- */
        --ease-out:  cubic-bezier(0.22, 0.61, 0.36, 1);
        --ease-soft: cubic-bezier(0.4, 0.0, 0.2, 1);
        --t-fast: 120ms;
        --t-base: 200ms;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100vh;
        background: var(--night-1);
        color: var(--fg-0);
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        font-feature-settings: "ss01" on, "cv11" on;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      h1, h2, p { margin: 0; }

      button {
        font: inherit;
        cursor: pointer;
        border: 1px solid transparent;
        background: transparent;
        color: inherit;
      }

      main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: var(--s-3);
        min-height: 100vh;
        padding: var(--s-3);
      }

      /* ---------- Topbar ---------- */
      .topbar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: var(--s-3);
        align-items: center;
        min-height: 56px;
        padding: var(--s-3) var(--s-4);
        border: 1px solid var(--line);
        border-radius: var(--r-md);
        background: linear-gradient(180deg, var(--night-2), var(--night-1));
      }

      .topbar__mark {
        position: relative;
        width: 36px;
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .topbar__mark svg {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        border-radius: 10px;
      }

      .topbar__mark .listening-halo {
        position: absolute;
        inset: -10px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(255,122,43,0.45) 0%, transparent 60%);
        z-index: 1;
        pointer-events: none;
        opacity: 0;
        transition: opacity var(--t-base) var(--ease-soft);
      }

      .topbar__mark.is-listening .listening-halo {
        opacity: 1;
        animation: listening-pulse 2.4s var(--ease-soft) infinite;
      }

      @keyframes listening-pulse {
        0%, 100% { transform: scale(0.92); opacity: 0.55; }
        50%      { transform: scale(1.08); opacity: 1; }
      }

      .topbar__title { display: grid; gap: 1px; min-width: 0; }
      .topbar__title h1 {
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.005em;
        color: var(--fg-0);
      }
      .topbar__title p {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-2);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      /* ---------- Status pill ---------- */
      .pill {
        display: inline-flex;
        align-items: center;
        gap: var(--s-2);
        padding: 5px var(--s-3);
        border-radius: var(--r-pill);
        font-family: var(--font-sans);
        font-size: 12px;
        font-weight: 500;
        line-height: 1;
        white-space: nowrap;
      }
      .pill__dot { width: 7px; height: 7px; border-radius: 999px; }
      .pill--listening { background: rgba(255,122,43,0.12); color: var(--ember-300); }
      .pill--listening .pill__dot {
        background: var(--ember-500);
        box-shadow: 0 0 8px var(--ember-500);
        animation: dot-pulse 1.8s var(--ease-soft) infinite;
      }
      .pill--idle { background: var(--night-3); color: var(--fg-1); }
      .pill--idle .pill__dot { background: var(--fg-3); }
      .pill--connecting { background: var(--info-bg); color: var(--info); }
      .pill--connecting .pill__dot {
        background: var(--info);
        animation: dot-pulse 1.2s var(--ease-soft) infinite;
      }
      .pill--offline { background: var(--danger-bg); color: var(--danger); }
      .pill--offline .pill__dot { background: var(--danger); }

      @keyframes dot-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%      { opacity: 0.55; transform: scale(0.86); }
      }

      /* ---------- Workspace ---------- */
      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) clamp(320px, 28vw, 420px);
        gap: var(--s-3);
        min-height: 0;
      }

      .video-rail {
        overflow: auto;
        z-index: 1;
        display: grid;
        gap: var(--s-3);
        align-content: start;
      }

      .video-stack {
        display: grid;
        gap: var(--s-3);
        align-content: start;
      }

      .video-tile {
        position: relative;
        overflow: hidden;
        border-radius: var(--r-md);
        background: var(--night-0);
        border: 1px solid var(--line);
        aspect-ratio: 16 / 9;
        transition: border-color var(--t-base) var(--ease-soft), box-shadow var(--t-base) var(--ease-soft);
      }

      .video-tile.is-speaking {
        border-color: var(--ember-500);
        box-shadow: var(--glow-ember-md);
      }

      video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: var(--night-0);
      }

      #localVideo { transform: scaleX(-1); }

      .video-label {
        position: absolute;
        bottom: var(--s-2);
        left: var(--s-2);
        max-width: calc(100% - 16px);
        padding: 5px var(--s-2);
        border-radius: var(--r-pill);
        background: rgba(11, 8, 5, 0.72);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        color: var(--fg-0);
        font-family: var(--font-sans);
        font-size: 11px;
        font-weight: 500;
        line-height: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ---------- Board (parchment) ---------- */
      .presentation-tile {
        position: relative;
        min-height: 0;
        min-width: 0;
        display: grid;
      }

      .board-surface {
        min-height: 0;
        max-width: 100%;
        overflow: auto;
        border-radius: var(--r-md);
        background: var(--ash-50);
        color: var(--fg-inverse);
        padding: var(--s-4);
        border: 1px solid var(--line);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(4, minmax(180px, 1fr));
        gap: var(--s-3);
        align-items: start;
        min-width: 768px;
      }

      .column {
        display: grid;
        gap: var(--s-3);
        background: #FFF;
        border: 1px solid var(--line-light);
        border-radius: var(--r-md);
        padding: var(--s-3);
        min-width: 0;
      }

      .column header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .column h2 {
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        color: var(--fg-inverse);
      }

      .count {
        display: inline-grid;
        place-items: center;
        min-width: 22px;
        height: 22px;
        padding: 0 7px;
        border-radius: 999px;
        background: var(--ash-100);
        color: var(--ash-700);
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
      }

      .stack { display: grid; gap: var(--s-2); }

      .empty {
        font-family: var(--font-sans);
        font-size: 12px;
        color: var(--ash-500);
        padding: var(--s-3) 0;
        font-style: italic;
      }

      .card {
        display: grid;
        gap: var(--s-2);
        background: #FFF;
        border: 1px solid var(--line-light);
        border-radius: var(--r-md);
        padding: var(--s-3);
        cursor: pointer;
        box-shadow: var(--shadow-light-1);
        transition: box-shadow var(--t-base) var(--ease-soft),
                    background var(--t-base) var(--ease-soft),
                    border-color var(--t-base) var(--ease-soft);
      }

      .card:hover { background: #FFFAF0; box-shadow: var(--shadow-light-2); }
      .card:focus-visible {
        outline: 2px solid var(--ember-500);
        outline-offset: 2px;
      }
      .card:active { transform: scale(0.985); }

      .card-heading {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: var(--s-2);
      }

      .card-heading strong {
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        color: var(--fg-inverse);
        min-width: 0;
        overflow-wrap: break-word;
        text-wrap: pretty;
      }

      .card p {
        color: var(--ash-600);
        font-size: 13px;
        line-height: 1.45;
      }

      .owner-avatar {
        display: inline-grid;
        place-items: center;
        overflow: hidden;
        width: 28px;
        height: 28px;
        border: 2px solid #FFF;
        border-radius: 999px;
        background: #F6F8FA;
        box-shadow: 0 0 0 1px rgba(27, 19, 10, 0.18);
        flex-shrink: 0;
      }
      .owner-avatar svg { display: block; width: 100%; height: 100%; }
      .owner-avatar.large { width: 44px; height: 44px; border-width: 3px; }

      .card.moved {
        animation: card-move-wiggle 1100ms var(--ease-soft);
        border-color: var(--ember-500);
        box-shadow: var(--glow-ember-md);
        transform-origin: 50% 50%;
        will-change: transform;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .tags li {
        padding: 4px 8px;
        border-radius: var(--r-xs);
        background: var(--tag-bg);
        color: var(--tag-color);
        font-family: var(--font-sans);
        font-size: 11px;
        font-weight: 600;
        line-height: 1;
      }

      /* ---------- Memory panel ---------- */
      .memory-panel {
        display: grid;
        gap: var(--s-2);
        background: var(--night-3);
        border: 1px solid var(--line);
        border-radius: var(--r-md);
        padding: var(--s-3);
      }

      .memory-panel header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--s-2);
      }

      .memory-panel h2 {
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        color: var(--fg-0);
      }

      .memory-count {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-2);
        font-variant-numeric: tabular-nums;
      }

      .memory-list {
        display: grid;
        gap: var(--s-2);
        max-height: 220px;
        overflow: auto;
      }

      .memory-item {
        display: grid;
        gap: 5px;
        background: rgba(255, 235, 200, 0.04);
        border: 1px solid var(--line-faint);
        border-radius: var(--r-sm);
        padding: var(--s-2) var(--s-3);
        color: var(--fg-0);
        font-size: 12px;
        line-height: 1.5;
      }

      .memory-item.answer {
        background: rgba(255, 122, 43, 0.10);
        border-color: rgba(255, 122, 43, 0.30);
      }

      .memory-meta {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--fg-2);
      }

      .memory-item.answer .memory-meta { color: var(--ember-300); }

      /* ---------- Meeting bar ---------- */
      .meeting-bar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center;
        gap: var(--s-3);
        min-height: 56px;
        padding: var(--s-2) var(--s-4);
        border: 1px solid var(--line);
        border-radius: var(--r-md);
        background: var(--night-2);
      }

      .log {
        font-family: var(--font-sans);
        font-size: 13px;
        color: var(--fg-1);
        min-height: 20px;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: var(--s-2);
        justify-content: center;
      }

      .btn {
        font-family: var(--font-sans);
        font-weight: 500;
        font-size: 14px;
        border-radius: var(--r-sm);
        padding: 10px var(--s-4);
        transition: background var(--t-base) var(--ease-soft),
                    box-shadow var(--t-base) var(--ease-soft),
                    border-color var(--t-base) var(--ease-soft),
                    transform var(--t-fast) var(--ease-soft),
                    opacity var(--t-base) var(--ease-soft);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--s-2);
        min-width: 96px;
      }
      .btn:active { transform: scale(0.985); }
      .btn:focus-visible {
        outline: 2px solid var(--ember-500);
        outline-offset: 2px;
        box-shadow: var(--glow-ember-sm);
      }
      .btn[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }

      .btn--primary {
        background: var(--ember-500);
        color: #2A1505;
        border-color: var(--ember-500);
      }
      .btn--primary:hover:not([disabled]) {
        background: var(--ember-400);
        box-shadow: var(--glow-ember-sm);
      }
      .btn--primary:active:not([disabled]) {
        background: var(--ember-700);
      }

      .btn--danger {
        background: var(--danger);
        color: #2A0F08;
        border-color: var(--danger);
        min-width: 0;
        padding: 9px;
        border-radius: var(--r-pill);
        width: 38px;
        height: 38px;
      }
      .btn--danger:hover:not([disabled]) { background: #EE6B53; }
      .btn--danger svg { display: block; }

      /* ---------- Toasts ---------- */
      .toast-region {
        position: fixed;
        right: var(--s-4);
        bottom: var(--s-4);
        z-index: 1100;
        display: grid;
        gap: var(--s-2);
        width: min(360px, calc(100vw - 36px));
        pointer-events: none;
      }

      .toast {
        border: 1px solid var(--line-strong);
        border-radius: var(--r-md);
        background: var(--night-3);
        box-shadow: var(--shadow-2);
        color: var(--fg-0);
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 500;
        line-height: 1.35;
        padding: var(--s-3);
        display: grid;
        grid-template-columns: 4px 1fr;
        gap: var(--s-3);
        align-items: center;
        animation: toast-in 180ms var(--ease-out);
        pointer-events: auto;
      }

      .toast__bar {
        width: 4px;
        height: 22px;
        border-radius: 999px;
        align-self: center;
        background: var(--ember-500);
      }
      .toast--done .toast__bar { background: var(--success); }
      .toast--note .toast__bar { background: var(--info); }
      .toast--error .toast__bar { background: var(--danger); }
      .toast--error { border-color: rgba(229, 87, 62, 0.4); }

      /* ---------- Sparks (formerly confetti) ---------- */
      .spark {
        position: fixed;
        z-index: 1000;
        width: 6px;
        height: 10px;
        border-radius: 2px;
        background: var(--spark-color);
        pointer-events: none;
        animation: spark-fly 1000ms var(--ease-out) forwards;
      }

      @keyframes spark-fly {
        0%   { opacity: 1; transform: translate3d(-50%, -50%, 0) scale(1) rotate(0deg); }
        70%  { opacity: 1; }
        100% { opacity: 0; transform: translate3d(calc(-50% + var(--dx)), calc(-50% + var(--dy)), 0) scale(0.65) rotate(var(--rotation)); }
      }

      /* ---------- Comment preview ---------- */
      .comment-preview-region {
        position: fixed;
        inset: 0;
        z-index: 1050;
        display: grid;
        place-items: center;
        padding: var(--s-6);
        pointer-events: none;
      }

      .comment-preview {
        display: grid;
        gap: var(--s-3);
        width: min(560px, calc(100vw - 48px));
        border: 1px solid var(--line-light);
        border-radius: var(--r-lg);
        background: #FFF;
        box-shadow: var(--shadow-3);
        color: var(--fg-inverse);
        padding: var(--s-5);
        transform-origin: 50% 60%;
        animation: comment-preview-open 260ms cubic-bezier(0.2, 0.9, 0.2, 1.15);
      }

      .comment-preview.closing {
        animation: comment-preview-close 220ms ease-in forwards;
      }

      .comment-preview-meta {
        justify-self: start;
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border-radius: var(--r-pill);
        background: rgba(255, 122, 43, 0.12);
        color: var(--ember-700);
        padding: 6px 10px;
      }

      .comment-preview-title {
        font-family: var(--font-sans);
        font-size: 18px;
        font-weight: 600;
        line-height: 1.25;
      }

      .comment-preview-details {
        display: grid;
        gap: var(--s-2);
      }

      .comment-preview-detail {
        display: grid;
        gap: 3px;
      }

      .comment-preview-detail-label {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ash-600);
      }

      .comment-preview-detail-value {
        font-family: var(--font-sans);
        color: var(--fg-inverse);
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .comment-preview-latest {
        display: grid;
        gap: 6px;
        border-radius: var(--r-md);
        background: rgba(255, 122, 43, 0.08);
        border: 1px solid rgba(255, 122, 43, 0.16);
        padding: var(--s-3);
      }

      /* ---------- Card detail modal ---------- */
      .card-detail-region {
        position: fixed;
        inset: 0;
        z-index: 1200;
        display: none;
        place-items: center;
        padding: var(--s-6);
        background: rgba(11, 8, 5, 0.62);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .card-detail-region.visible { display: grid; }

      .card-detail {
        display: grid;
        gap: var(--s-4);
        width: min(620px, calc(100vw - 48px));
        max-height: calc(100vh - 48px);
        overflow: auto;
        border: 1px solid var(--line-light);
        border-radius: var(--r-lg);
        background: #FFF;
        box-shadow: var(--shadow-3);
        color: var(--fg-inverse);
        padding: var(--s-5);
      }

      .card-detail-header {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: start;
        gap: var(--s-3);
      }

      .card-detail-title {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .card-detail-title strong {
        font-family: var(--font-sans);
        font-size: 20px;
        font-weight: 600;
        line-height: 1.25;
      }

      .card-detail-owner {
        font-family: var(--font-sans);
        color: var(--ash-600);
        font-size: 13px;
      }

      .card-detail-close {
        min-width: 0;
        border: 0;
        border-radius: var(--r-sm);
        background: transparent;
        color: var(--ash-600);
        font-size: 22px;
        line-height: 1;
        padding: 4px 8px;
      }
      .card-detail-close:hover {
        background: var(--ash-100);
        color: var(--fg-inverse);
      }

      @keyframes card-move-wiggle {
        0%   { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
        12%  { transform: translate3d(-10px, -12px, 0) rotate(-4deg) scale(1.05); }
        24%  { transform: translate3d(9px, 4px, 0) rotate(4deg) scale(1.03); }
        36%  { transform: translate3d(-7px, -7px, 0) rotate(-3deg) scale(1.04); }
        48%  { transform: translate3d(6px, 2px, 0) rotate(3deg) scale(1.02); }
        62%  { transform: translate3d(-4px, -4px, 0) rotate(-2deg) scale(1.025); }
        78%  { transform: translate3d(3px, 1px, 0) rotate(1.2deg) scale(1.01); }
        100% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
      }

      @keyframes toast-in {
        0%   { opacity: 0; transform: translate3d(0, 8px, 0) scale(0.98); }
        100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
      }

      @keyframes comment-preview-open {
        0%   { opacity: 0; transform: translate3d(0, 22px, 0) scale(0.9) rotate(-1.5deg); }
        72%  { opacity: 1; transform: translate3d(0, -4px, 0) scale(1.025) rotate(0.5deg); }
        100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
      }

      @keyframes comment-preview-close {
        0%   { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
        100% { opacity: 0; transform: translate3d(0, -18px, 0) scale(0.96) rotate(1deg); }
      }

      @media (max-width: 1100px) {
        .workspace { grid-template-columns: minmax(0, 1fr) 320px; }
        .board { grid-template-columns: repeat(4, minmax(160px, 1fr)); min-width: 688px; }
      }

      @media (max-width: 860px) {
        .topbar { grid-template-columns: auto 1fr; }
        .topbar .pill { grid-column: 1 / -1; justify-self: start; }
        .workspace { grid-template-columns: 1fr; }
        .video-rail { order: -1; overflow: visible; }
        .video-stack { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        .meeting-bar { grid-template-columns: 1fr; justify-items: stretch; }
        .controls { order: -1; }
      }

      @media (max-width: 640px) {
        .board { grid-template-columns: 1fr; min-width: 0; }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <span id="brandMark" class="topbar__mark" aria-hidden="true">
          <span class="listening-halo"></span>
          <svg viewBox="0 0 64 64" fill="none">
            <defs>
              <radialGradient id="emberCore" cx="50%" cy="55%" r="55%">
                <stop offset="0%"   stop-color="#FFF1E3"></stop>
                <stop offset="22%"  stop-color="#FFD27A"></stop>
                <stop offset="55%"  stop-color="#FF7A2B"></stop>
                <stop offset="100%" stop-color="#5F1D03"></stop>
              </radialGradient>
              <radialGradient id="emberHalo" cx="50%" cy="55%" r="55%">
                <stop offset="0%"   stop-color="#FF7A2B" stop-opacity="0.4"></stop>
                <stop offset="100%" stop-color="#FF7A2B" stop-opacity="0"></stop>
              </radialGradient>
            </defs>
            <rect width="64" height="64" rx="14" fill="#110D09"></rect>
            <circle cx="32" cy="36" r="28" fill="url(#emberHalo)"></circle>
            <circle cx="32" cy="36" r="14" fill="url(#emberCore)"></circle>
            <ellipse cx="29" cy="31" rx="3" ry="5" fill="#FFF1E3" fill-opacity="0.55"></ellipse>
          </svg>
        </span>
        <div class="topbar__title">
          <h1>The Bonfire</h1>
          <p>agentic meeting room</p>
        </div>
        <span id="statusPill" class="pill pill--idle" role="status" aria-live="polite">
          <span class="pill__dot"></span>
          <span id="statusText">not connected</span>
        </span>
      </header>

      <div class="workspace">
        <section class="presentation-tile" aria-label="Shared kanban board">
          <div class="board-surface">
            <section id="board" class="board" aria-label="Kanban board"></section>
          </div>
        </section>

        <aside class="video-rail" aria-label="Conference videos">
          <div id="videoStack" class="video-stack">
            <div class="video-tile">
              <video id="localVideo" autoplay muted playsinline></video>
              <span class="video-label">you</span>
            </div>
          </div>
          <section class="memory-panel" aria-label="Meeting memory">
            <header>
              <h2>meeting memory</h2>
              <span id="memoryCount" class="memory-count">0 saved</span>
            </header>
            <div id="memoryList" class="memory-list">
              <article class="memory-item">
                <span class="memory-meta">ready</span>
                <span>memory starts when the room speaks.</span>
              </article>
            </div>
          </section>
        </aside>
      </div>

      <footer class="meeting-bar">
        <p id="log" class="log" aria-live="polite">team meeting</p>
        <div class="controls">
          <button id="join" class="btn btn--primary" type="button">Join the room</button>
          <button id="leave" class="btn btn--danger" type="button" aria-label="Leave the room" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91"></path>
              <line x1="22" y1="2" x2="2" y2="22"></line>
            </svg>
          </button>
        </div>
        <span aria-hidden="true"></span>
      </footer>
    </main>
    <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
    <div id="commentPreviewRegion" class="comment-preview-region" aria-live="polite" aria-atomic="true"></div>
    <div id="cardDetailRegion" class="card-detail-region"></div>

    <script>
      const statuses = ['Backlog', 'In Progress', 'Blocked', 'Done']
      const boardEl = document.getElementById('board')
      const statusPillEl = document.getElementById('statusPill')
      const statusTextEl = document.getElementById('statusText')
      const brandMarkEl = document.getElementById('brandMark')
      const logEl = document.getElementById('log')
      const joinButton = document.getElementById('join')
      const leaveButton = document.getElementById('leave')
      const localVideo = document.getElementById('localVideo')
      const videoStack = document.getElementById('videoStack')
      const toastRegion = document.getElementById('toastRegion')
      const commentPreviewRegion = document.getElementById('commentPreviewRegion')
      const cardDetailRegion = document.getElementById('cardDetailRegion')
      const memoryList = document.getElementById('memoryList')
      const memoryCount = document.getElementById('memoryCount')

      let cards = []
      let memoryEntries = []
      let pc
      let ws
      let localStream
      let hasBoardSnapshot = false
      let commentPreviewTimer
      const remoteElements = new Map()
      const cardSnapshots = new Map()
      const mediaConstraints = {
        video: {
          width: { ideal: 640, max: 640 },
          height: { ideal: 360, max: 360 },
          frameRate: { ideal: 15, max: 15 },
          facingMode: 'user'
        },
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
          channelCount: { ideal: 1, max: 1 }
        }
      }
      const outboundMediaLimits = {
        audio: { maxBitrate: 24000 },
        video: { maxBitrate: 450000, maxFramerate: 15 }
      }

      joinButton.addEventListener('click', joinRoom)
      leaveButton.addEventListener('click', leaveRoom)
      window.addEventListener('beforeunload', leaveRoom)
      window.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
          closeCardDetail()
        }
      })
      cardDetailRegion.addEventListener('click', event => {
        if (event.target === cardDetailRegion) {
          closeCardDetail()
        }
      })

      setConnectionState('idle', 'not connected')
      renderBoard()

      async function joinRoom() {
        joinButton.disabled = true
        setConnectionState('connecting', 'connecting…')
        setLog('requesting camera and microphone')

        try {
          localStream = await navigator.mediaDevices.getUserMedia(mediaConstraints)
          localVideo.srcObject = localStream

          pc = new RTCPeerConnection()
          pc.ontrack = addRemoteTrack
          pc.onicecandidate = event => {
            if (!event.candidate || ws?.readyState !== WebSocket.OPEN) {
              return
            }
            ws.send(JSON.stringify({ event: 'candidate', data: JSON.stringify(event.candidate) }))
          }
          pc.onconnectionstatechange = () => {
            const state = pc.connectionState
            if (state === 'connected') {
              setConnectionState('listening', 'the room is listening')
            } else if (state === 'connecting' || state === 'new') {
              setConnectionState('connecting', 'connecting…')
            } else if (['failed', 'closed', 'disconnected'].includes(state)) {
              leaveRoom()
            }
          }

          for (const track of localStream.getTracks()) {
            await addLocalTrack(track)
          }

          const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws'
          ws = new WebSocket(`${scheme}://${window.location.host}/websocket`)
          ws.onopen = () => {
            leaveButton.disabled = false
            setConnectionState('listening', 'the room is listening')
            setLog('in the room')
          }
          ws.onmessage = event => handleSignal(JSON.parse(event.data))
          ws.onclose = () => leaveRoom()
          ws.onerror = () => setLog('websocket error')
        } catch (error) {
          setLog(error.message || String(error))
          leaveRoom()
        }
      }

      async function addLocalTrack(track) {
        const init = { streams: [localStream] }
        const limits = outboundMediaLimits[track.kind]
        if (limits) {
          init.sendEncodings = [{ ...limits }]
        }

        const transceiver = pc.addTransceiver(track, init)
        await configureOutboundSender(transceiver.sender, track)
      }

      async function configureOutboundSender(sender, track) {
        if (!sender?.getParameters || !sender?.setParameters) {
          return
        }

        const limits = outboundMediaLimits[track.kind]
        if (!limits) {
          return
        }

        const parameters = sender.getParameters()
        if (!parameters.encodings?.length) {
          return
        }

        const encoding = parameters.encodings[0]
        if (Number.isFinite(limits.maxBitrate)) {
          encoding.maxBitrate = limits.maxBitrate
        }
        if (track.kind === 'video' && Number.isFinite(limits.maxFramerate)) {
          encoding.maxFramerate = limits.maxFramerate
        }

        try {
          await sender.setParameters(parameters)
        } catch (error) {
          console.warn('Could not apply outbound media limits', error)
        }
      }

      async function handleSignal(message) {
        switch (message.event) {
          case 'offer': {
            const offer = JSON.parse(message.data)
            await pc.setRemoteDescription(offer)
            const answer = await pc.createAnswer()
            await pc.setLocalDescription(answer)
            ws.send(JSON.stringify({ event: 'answer', data: JSON.stringify(answer) }))
            break
          }
          case 'candidate': {
            const candidate = JSON.parse(message.data)
            await pc.addIceCandidate(candidate)
            break
          }
          case 'kanban':
            handleKanbanMessage(JSON.parse(message.data))
            break
        }
      }

      function handleKanbanMessage(message) {
        switch (message.event) {
          case 'board':
            cards = Array.isArray(message.data?.cards) ? message.data.cards : []
            {
              const changes = cardChanges(cards)
              renderBoard(changes)
              changes.toasts.forEach(showToast)
              changes.commentPreviews.forEach(showCommentPreview)
            }
            break
          case 'memory':
            memoryEntries = Array.isArray(message.data) ? message.data : []
            renderMemory()
            break
          case 'memory_transcript':
            addMemoryEntry(message.data)
            break
          case 'memory_answer':
            addMemoryEntry({
              id: `answer-${Date.now()}`,
              kind: 'answer',
              text: message.data?.answer || 'no answer available.',
              createdAt: new Date().toISOString(),
              metadata: { query: message.data?.query || '' }
            })
            setLog(message.data?.answer || 'memory answer ready.')
            showToast({ text: 'memory answer ready', kind: 'note' })
            break
          case 'status':
            setLog(String(message.data || ''))
            break
        }
      }

      function addRemoteTrack(event) {
        if (event.track.kind === 'audio') {
          return
        }

        const stream = event.streams[0]
        if (!stream || remoteElements.has(stream.id)) {
          return
        }

        const tile = document.createElement('div')
        tile.className = 'video-tile'

        const video = document.createElement('video')
        video.autoplay = true
        video.playsInline = true
        video.srcObject = stream

        const label = document.createElement('span')
        label.className = 'video-label'
        label.textContent = 'participant'

        tile.append(video, label)
        videoStack.appendChild(tile)
        remoteElements.set(stream.id, tile)

        stream.onremovetrack = () => {
          tile.remove()
          remoteElements.delete(stream.id)
        }
      }

      function addMemoryEntry(entry) {
        if (!entry?.text) {
          return
        }

        memoryEntries.push(entry)
        if (memoryEntries.length > 20) {
          memoryEntries = memoryEntries.slice(memoryEntries.length - 20)
        }
        renderMemory()
      }

      function renderMemory() {
        memoryCount.textContent = `${memoryEntries.length} saved`
        if (memoryEntries.length === 0) {
          const empty = document.createElement('article')
          empty.className = 'memory-item'
          const meta = document.createElement('span')
          meta.className = 'memory-meta'
          meta.textContent = 'ready'
          const text = document.createElement('span')
          text.textContent = 'memory starts when the room speaks.'
          empty.append(meta, text)
          memoryList.replaceChildren(empty)
          return
        }

        memoryList.replaceChildren(...memoryEntries.slice().reverse().map(renderMemoryEntry))
      }

      function renderMemoryEntry(entry) {
        const item = document.createElement('article')
        item.className = `memory-item ${entry.kind === 'answer' ? 'answer' : ''}`.trim()

        const meta = document.createElement('span')
        meta.className = 'memory-meta'
        meta.textContent = memoryEntryLabel(entry)

        const text = document.createElement('span')
        text.textContent = entry.text || ''

        item.append(meta, text)
        return item
      }

      function memoryEntryLabel(entry) {
        const createdAt = entry.createdAt ? new Date(entry.createdAt) : null
        const time = createdAt && !Number.isNaN(createdAt.valueOf())
          ? createdAt.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
          : 'now'
        if (entry.kind === 'answer') {
          return `answer · ${time}`
        }
        return `transcript · ${time}`
      }

      function renderBoard(changes = { moved: new Set(), completed: new Set(), toasts: [], commentPreviews: [] }) {
        boardEl.replaceChildren(...statuses.map(status => {
          const columnCards = cards.filter(card => card.status === status)
          const column = document.createElement('section')
          column.className = 'column'
          column.setAttribute('aria-label', `${status} cards`)

          const header = document.createElement('header')
          const title = document.createElement('h2')
          title.textContent = status
          const count = document.createElement('span')
          count.className = 'count'
          count.textContent = String(columnCards.length)
          header.append(title, count)

          const stack = document.createElement('div')
          stack.className = 'stack'
          if (columnCards.length === 0) {
            const empty = document.createElement('div')
            empty.className = 'empty'
            empty.textContent = 'nothing here yet'
            stack.appendChild(empty)
          } else {
            stack.append(...columnCards.map(card => renderCard(
              card,
              changes.moved.has(card.id),
              changes.completed.has(card.id)
            )))
          }

          column.append(header, stack)
          return column
        }))
      }

      function renderCard(card, moved = false, completed = false) {
        const article = document.createElement('article')
        article.className = 'card'
        article.tabIndex = 0
        article.setAttribute('role', 'button')
        article.setAttribute('aria-label', `Open card details for ${card.title || 'untitled card'}`)
        article.addEventListener('click', () => showCardDetail(card))
        article.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault()
            showCardDetail(card)
          }
        })
        if (moved) {
          window.requestAnimationFrame(() => {
            article.classList.add('moved')
            window.setTimeout(() => article.classList.remove('moved'), 1200)
          })
        }
        if (completed) {
          window.requestAnimationFrame(() => fireSparks(article))
        }

        const heading = document.createElement('div')
        heading.className = 'card-heading'

        const title = document.createElement('strong')
        title.textContent = card.title
        heading.append(title, renderOwnerAvatar(card))
        article.appendChild(heading)

        if (card.tags?.length > 0) {
          const tags = document.createElement('ul')
          tags.className = 'tags'
          tags.setAttribute('aria-label', `${card.title} tags`)
          tags.append(...card.tags.map(tag => {
            const item = document.createElement('li')
            const colors = tagColors(tag)
            item.style.setProperty('--tag-bg', colors.background)
            item.style.setProperty('--tag-color', colors.color)
            item.textContent = tag
            return item
          }))
          article.appendChild(tags)
        }

        return article
      }

      function renderOwnerAvatar(card, options = {}) {
        const owner = cardOwner(card)
        const avatar = document.createElement('span')
        avatar.className = `owner-avatar${options.large ? ' large' : ''}`
        avatar.title = `owner: ${owner.name}`
        avatar.setAttribute('aria-label', `Owner: ${owner.name}`)
        avatar.appendChild(renderIdenticon(owner.name))
        return avatar
      }

      function cardOwner(card) {
        const owners = [
          'Avery Chen',
          'Blake Stone',
          'Casey Morgan',
          'Dana Patel',
          'Emery Brooks',
          'Finley Rao',
          'Harper Kim',
          'Jordan Lee'
        ]
        const seed = String(card?.id || card?.title || 'kanban-card')
        const hash = hashString(seed)
        return {
          name: owners[hash % owners.length]
        }
      }

      function renderIdenticon(seed) {
        const svgNS = 'http://www.w3.org/2000/svg'
        const svg = document.createElementNS(svgNS, 'svg')
        svg.setAttribute('viewBox', '0 0 5 5')
        svg.setAttribute('aria-hidden', 'true')

        const background = document.createElementNS(svgNS, 'rect')
        background.setAttribute('width', '5')
        background.setAttribute('height', '5')
        background.setAttribute('fill', '#F6F8FA')
        svg.appendChild(background)

        // Warm-clamped identicon: hues 18°-60°, saturation 60-80%, lightness 26-40%.
        const hue = 18 + (hashString(`${seed}:hue`) % 42)
        const sat = 60 + (hashString(`${seed}:sat`) % 20)
        const lit = 26 + (hashString(`${seed}:lit`) % 14)
        const color = `hsl(${hue} ${sat}% ${lit}%)`

        const patternHash = hashString(`${seed}:pattern`)
        let filled = 0

        for (let y = 0; y < 5; y++) {
          for (let x = 0; x < 3; x++) {
            const bitIndex = y * 3 + x
            if (((patternHash >>> bitIndex) & 1) === 0) {
              continue
            }

            appendIdenticonCell(svg, x, y, color)
            filled++
            if (x !== 2) {
              appendIdenticonCell(svg, 4 - x, y, color)
            }
          }
        }

        if (filled === 0) {
          appendIdenticonCell(svg, 2, 2, color)
        }

        return svg
      }

      function appendIdenticonCell(svg, x, y, color) {
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect')
        rect.setAttribute('x', String(x))
        rect.setAttribute('y', String(y))
        rect.setAttribute('width', '1')
        rect.setAttribute('height', '1')
        rect.setAttribute('fill', color)
        svg.appendChild(rect)
      }

      function hashString(value) {
        let hash = 2166136261
        const text = String(value || '')
        for (let index = 0; index < text.length; index++) {
          hash ^= text.charCodeAt(index)
          hash = Math.imul(hash, 16777619)
        }
        return hash >>> 0
      }

      function showCardDetail(card) {
        if (!card) {
          return
        }

        const owner = cardOwner(card)
        const panel = document.createElement('article')
        panel.className = 'card-detail'
        panel.setAttribute('role', 'dialog')
        panel.setAttribute('aria-modal', 'true')
        panel.setAttribute('aria-label', `Card details for ${card.title || 'untitled card'}`)

        const header = document.createElement('header')
        header.className = 'card-detail-header'

        const titleGroup = document.createElement('div')
        titleGroup.className = 'card-detail-title'
        const title = document.createElement('strong')
        title.textContent = card.title || 'Untitled card'
        const ownerText = document.createElement('span')
        ownerText.className = 'card-detail-owner'
        ownerText.textContent = `owner · ${owner.name}`
        titleGroup.append(title, ownerText)

        const closeButton = document.createElement('button')
        closeButton.className = 'card-detail-close'
        closeButton.type = 'button'
        closeButton.setAttribute('aria-label', 'Close card details')
        closeButton.textContent = '×'
        closeButton.addEventListener('click', closeCardDetail)

        header.append(renderOwnerAvatar(card, { large: true }), titleGroup, closeButton)

        const details = document.createElement('div')
        details.className = 'comment-preview-details'
        details.appendChild(renderPreviewDetail('status', card.status || 'unassigned'))
        details.appendChild(renderPreviewDetail('card id', card.id || 'no card id'))
        details.appendChild(renderPreviewDetail('owner', owner.name))
        details.appendChild(renderPreviewDetail('tags', card.tags?.length > 0 ? renderTagList(card) : 'no tags'))
        details.appendChild(renderPreviewDetail('notes', card.notes || 'no notes yet.'))

        panel.append(header, details)
        cardDetailRegion.replaceChildren(panel)
        cardDetailRegion.classList.add('visible')
        closeButton.focus()
      }

      function closeCardDetail() {
        cardDetailRegion.classList.remove('visible')
        cardDetailRegion.replaceChildren()
      }

      function renderTagList(card) {
        const tags = document.createElement('ul')
        tags.className = 'tags'
        tags.setAttribute('aria-label', `${card.title || 'Card'} tags`)
        tags.append(...(card.tags || []).map(tag => {
          const item = document.createElement('li')
          const colors = tagColors(tag)
          item.style.setProperty('--tag-bg', colors.background)
          item.style.setProperty('--tag-color', colors.color)
          item.textContent = tag
          return item
        }))
        return tags
      }

      function cardChanges(nextCards) {
        const moved = new Set()
        const completed = new Set()
        const toasts = []
        const commentPreviews = []
        const nextIds = new Set()
        const shouldToast = hasBoardSnapshot

        for (const card of nextCards) {
          nextIds.add(card.id)
          const previousCard = cardSnapshots.get(card.id)
          if (!previousCard) {
            if (shouldToast) {
              toasts.push({ text: `new card · ${card.title} → ${card.status}`, kind: 'move' })
            }
            cardSnapshots.set(card.id, cardSnapshot(card))
            continue
          }

          if (previousCard.status !== card.status) {
            moved.add(card.id)
            const isDone = card.status === 'Done'
            if (isDone) {
              completed.add(card.id)
            }
            if (shouldToast) {
              toasts.push({
                text: `moved ${card.title} to ${card.status}`,
                kind: isDone ? 'done' : 'move'
              })
            }
          }

          if (previousCard.title !== card.title) {
            if (shouldToast) {
              toasts.push({ text: `renamed ${previousCard.title} to ${card.title}`, kind: 'move' })
            }
          }

          if (!sameTags(previousCard.tags, card.tags || [])) {
            if (shouldToast) {
              toasts.push({ text: `tags updated on ${card.title}`, kind: 'move' })
            }
          }

          if (previousCard.notes !== (card.notes || '')) {
            if (shouldToast) {
              const comment = addedComment(previousCard.notes, card.notes || '')
              toasts.push({
                text: comment ? `new note on ${card.title}` : `updated ${card.title}`,
                kind: 'note'
              })
              if (comment) {
                commentPreviews.push({ card: cardSnapshot(card), comment })
              }
            }
          }

          cardSnapshots.set(card.id, cardSnapshot(card))
        }

        for (const [cardId, previousCard] of cardSnapshots.entries()) {
          if (!nextIds.has(cardId)) {
            if (shouldToast) {
              toasts.push({ text: `deleted ${previousCard.title}`, kind: 'error' })
            }
            cardSnapshots.delete(cardId)
          }
        }
        hasBoardSnapshot = true

        return { moved, completed, toasts, commentPreviews }
      }

      function cardSnapshot(card) {
        return {
          id: card.id || '',
          title: card.title || '',
          status: card.status || '',
          notes: card.notes || '',
          tags: Array.isArray(card.tags) ? [...card.tags] : []
        }
      }

      function sameTags(left, right) {
        if (left.length !== right.length) {
          return false
        }

        return left.every((tag, index) => tag === right[index])
      }

      function addedComment(previousNotes, nextNotes) {
        const previous = String(previousNotes || '').trim()
        const next = String(nextNotes || '').trim()
        if (!next || next === previous) {
          return ''
        }
        if (previous && next.startsWith(previous)) {
          return next.slice(previous.length).replace(/^[\s:;,.|-]+/, '').trim() || next
        }
        return next
      }

      function showToast(message) {
        if (!message) {
          return
        }

        const payload = typeof message === 'string' ? { text: message, kind: 'move' } : message
        if (!payload.text) {
          return
        }

        const toast = document.createElement('div')
        toast.className = `toast toast--${payload.kind || 'move'}`

        const bar = document.createElement('span')
        bar.className = 'toast__bar'
        const body = document.createElement('span')
        body.textContent = payload.text

        toast.append(bar, body)
        toastRegion.appendChild(toast)

        while (toastRegion.children.length > 4) {
          toastRegion.firstElementChild.remove()
        }
        window.setTimeout(() => toast.remove(), 4200)
      }

      function showCommentPreview(preview) {
        if (!preview?.comment) {
          return
        }

        window.clearTimeout(commentPreviewTimer)

        const panel = document.createElement('article')
        panel.className = 'comment-preview'
        panel.setAttribute('aria-label', `Card details for ${preview.card.title}`)

        const meta = document.createElement('span')
        meta.className = 'comment-preview-meta'
        meta.textContent = `${preview.card.status || 'card'} · new note`

        const title = document.createElement('strong')
        title.className = 'comment-preview-title'
        title.textContent = preview.card.title || 'Untitled card'

        const details = document.createElement('div')
        details.className = 'comment-preview-details'

        details.appendChild(renderPreviewDetail('status', preview.card.status || 'unassigned'))
        details.appendChild(renderPreviewDetail('card id', preview.card.id || 'no card id'))
        details.appendChild(renderPreviewDetail('owner', cardOwner(preview.card).name))
        if (preview.card.tags?.length > 0) {
          details.appendChild(renderPreviewDetail('tags', renderTagList(preview.card)))
        } else {
          details.appendChild(renderPreviewDetail('tags', 'no tags'))
        }
        details.appendChild(renderPreviewDetail('notes', preview.card.notes || 'no notes yet.'))

        const latest = document.createElement('div')
        latest.className = 'comment-preview-latest'
        latest.appendChild(renderPreviewDetail('latest comment', preview.comment))

        const previewHeader = document.createElement('div')
        previewHeader.className = 'card-detail-header'
        const previewTitle = document.createElement('div')
        previewTitle.className = 'card-detail-title'
        const ownerText = document.createElement('span')
        ownerText.className = 'card-detail-owner'
        ownerText.textContent = `owner · ${cardOwner(preview.card).name}`
        previewTitle.append(title, ownerText)
        previewHeader.append(renderOwnerAvatar(preview.card, { large: true }), previewTitle)

        panel.append(meta, previewHeader, details, latest)
        commentPreviewRegion.replaceChildren(panel)

        commentPreviewTimer = window.setTimeout(() => closeCommentPreview(panel), 4200)
      }

      function renderPreviewDetail(labelText, value) {
        const detail = document.createElement('div')
        detail.className = 'comment-preview-detail'

        const label = document.createElement('span')
        label.className = 'comment-preview-detail-label'
        label.textContent = labelText

        let valueEl
        if (value instanceof Node) {
          valueEl = value
        } else {
          valueEl = document.createElement('p')
          valueEl.className = 'comment-preview-detail-value'
          valueEl.textContent = String(value)
        }

        detail.append(label, valueEl)
        return detail
      }

      function closeCommentPreview(panel) {
        if (!panel || panel.parentElement !== commentPreviewRegion) {
          return
        }

        panel.classList.add('closing')
        panel.addEventListener('animationend', () => panel.remove(), { once: true })
      }

      // Warm ember/amber sparks — no rainbow.
      const SPARK_PALETTE = ['#FFD27A', '#FFB23F', '#FF8A3D', '#FF7A2B', '#ED5A14', '#C13E07', '#FFF1E3']

      function fireSparks(anchor) {
        const rect = anchor.getBoundingClientRect()
        const originX = rect.left + rect.width / 2
        const originY = rect.top + Math.min(rect.height / 2, 48)

        for (let index = 0; index < 24; index++) {
          const piece = document.createElement('span')
          const angle = (Math.PI * 2 * index) / 24
          const distance = 46 + Math.random() * 58
          const drift = (Math.random() - 0.5) * 42

          piece.className = 'spark'
          piece.style.left = `${originX}px`
          piece.style.top = `${originY}px`
          piece.style.setProperty('--dx', `${Math.cos(angle) * distance + drift}px`)
          piece.style.setProperty('--dy', `${Math.sin(angle) * distance + 42 + Math.random() * 28}px`)
          piece.style.setProperty('--rotation', `${Math.random() * 720 - 360}deg`)
          piece.style.setProperty('--spark-color', SPARK_PALETTE[index % SPARK_PALETTE.length])

          document.body.appendChild(piece)
          window.setTimeout(() => piece.remove(), 1050)
        }
      }

      function tagColors(tag) {
        let hash = 0
        for (const character of String(tag)) {
          hash = ((hash << 5) - hash + character.charCodeAt(0)) | 0
        }

        // Warm-shifted hue range: ember/amber/ash. 12°-58°, lights for chip bg.
        const hue = 12 + (Math.abs(hash) % 46)
        return {
          background: `hsl(${hue} 78% 91%)`,
          color: `hsl(${hue} 70% 28%)`
        }
      }

      function leaveRoom() {
        joinButton.disabled = false
        leaveButton.disabled = true

        if (ws && ws.readyState !== WebSocket.CLOSED) {
          ws.close()
        }
        ws = undefined

        if (pc) {
          pc.close()
        }
        pc = undefined

        if (localStream) {
          localStream.getTracks().forEach(track => track.stop())
        }
        localStream = undefined
        localVideo.srcObject = null

        remoteElements.forEach(tile => tile.remove())
        remoteElements.clear()
        setConnectionState('idle', 'not connected')
        setLog('team meeting')
      }

      function setConnectionState(state, label) {
        statusPillEl.className = `pill pill--${state}`
        statusTextEl.textContent = label
        if (state === 'listening') {
          brandMarkEl.classList.add('is-listening')
        } else {
          brandMarkEl.classList.remove('is-listening')
        }
      }

      function setLog(message) {
        logEl.textContent = message
      }
    </script>
  </body>
</html>
