<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Buttons · primary</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <span class="label">Buttons · primary (ember)</span>
  <div style="display:flex;gap:12px;margin-top:18px;align-items:center;">
    <button style="font-family:var(--font-sans);font-weight:500;font-size:14px;border-radius:6px;padding:10px 16px;min-height:40px;min-width:96px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;cursor:pointer;background:var(--ember-500);color:#2A1505;border-color:var(--ember-500);">Join the room</button>
    <button style="font-family:var(--font-sans);font-weight:500;font-size:14px;border-radius:6px;padding:10px 16px;min-height:40px;min-width:96px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;cursor:pointer;background:var(--ember-400);color:#2A1505;border-color:var(--ember-400);box-shadow:0 0 0 1px rgba(255,122,43,0.45), 0 0 16px rgba(255,122,43,0.25);">Join the room</button>
    <button style="font-family:var(--font-sans);font-weight:500;font-size:14px;border-radius:6px;padding:10px 16px;min-height:40px;min-width:96px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;cursor:pointer;background:var(--ember-500);color:#2A1505;border-color:var(--ember-500);opacity:0.45;cursor:not-allowed;">Join the room</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,96px);gap:12px;margin-top:10px;">
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em;">rest</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em;">hover</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em;">disabled</span>
  </div>
</div></body></html>
