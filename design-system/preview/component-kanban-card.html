<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Kanban card</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card card--parchment">
  <span class="label label--inv">Kanban card · parchment</span>
  <div style="margin-top:16px;display:grid;gap:8px;background:#FFF;border:1px solid var(--line-light);border-radius:10px;padding:12px;box-shadow:0 1px 2px rgba(60,35,10,0.06);max-width:320px;">
    <div style="display:grid;grid-template-columns:1fr auto;align-items:start;gap:8px;">
      <strong style="font-family:var(--font-sans);font-size:14px;font-weight:600;line-height:1.3;color:var(--fg-inverse);">Add RTP Retransmission Buffer</strong>
      <span id="av" style="display:inline-grid;place-items:center;overflow:hidden;width:28px;height:28px;border:2px solid #FFF;border-radius:999px;background:#F6F8FA;box-shadow:0 0 0 1px rgba(27,19,10,0.18);"></span>
    </div>
    <div style="color:var(--ash-600);font-size:12px;">owner · Tim</div>
    <ul style="display:flex;gap:6px;margin:0;padding:0;flex-wrap:wrap;">
      <li style="padding:4px 8px;border-radius:4px;background:rgba(255, 122, 43, 0.12);color:var(--ember-700);font-family:var(--font-sans);font-size:11px;font-weight:600;line-height:1;list-style:none;">webrtc</li>
      <li style="padding:4px 8px;border-radius:4px;background:rgba(255, 122, 43, 0.12);color:var(--ember-700);font-family:var(--font-sans);font-size:11px;font-weight:600;line-height:1;list-style:none;">rtp</li>
      <li style="padding:4px 8px;border-radius:4px;background:rgba(255, 178, 63, 0.16);color:#8A5709;font-family:var(--font-sans);font-size:11px;font-weight:600;line-height:1;list-style:none;">bandwidth</li>
    </ul>
  </div>
  <script>
    function hashString(v){let h=2166136261;for(const c of String(v||'')){h^=c.charCodeAt(0);h=Math.imul(h,16777619)}return h>>>0}
    const svgNS='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(svgNS,'svg');svg.setAttribute('viewBox','0 0 5 5');svg.style.cssText='display:block;width:100%;height:100%;';
    const bg=document.createElementNS(svgNS,'rect');bg.setAttribute('width','5');bg.setAttribute('height','5');bg.setAttribute('fill','#F6F8FA');svg.appendChild(bg);
    const seed='Tim';const hue=18+(hashString(seed+':hue')%42),sat=60+(hashString(seed+':sat')%20),lit=26+(hashString(seed+':lit')%14);
    const color='hsl('+hue+' '+sat+'% '+lit+'%)';const p=hashString(seed+':pattern');
    for(let y=0;y<5;y++)for(let x=0;x<3;x++){const b=y*3+x;if(((p>>>b)&1)===0)continue;
      [x,4-x].forEach((xx,i)=>{if(i===1&&xx===x)return;const r=document.createElementNS(svgNS,'rect');r.setAttribute('x',xx);r.setAttribute('y',y);r.setAttribute('width','1');r.setAttribute('height','1');r.setAttribute('fill',color);svg.appendChild(r);});
    }
    document.getElementById('av').appendChild(svg);
  </script>
</div></body></html>
