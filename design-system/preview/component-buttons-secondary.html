<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Buttons · secondary</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <span class="label">Buttons · secondary</span>
  <div style="display:flex;gap:12px;margin-top:18px;align-items:center;">
    <button style="font-family:var(--font-sans);font-weight:500;font-size:14px;border-radius:6px;padding:10px 16px;min-height:40px;min-width:96px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;cursor:pointer;background:rgba(255,235,200,0.06);color:var(--fg-1);border-color:var(--line-strong);">Share screen</button>
    <button style="font-family:var(--font-sans);font-weight:500;font-size:14px;border-radius:6px;padding:10px 16px;min-height:40px;min-width:96px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;cursor:pointer;background:rgba(255,235,200,0.10);color:var(--fg-1);border-color:rgba(255,235,200,0.22);">Share screen</button>
    <button style="font-family:var(--font-sans);font-weight:500;font-size:14px;border-radius:6px;padding:10px 16px;min-height:40px;min-width:96px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;cursor:pointer;background:rgba(255,235,200,0.06);color:var(--fg-1);border-color:var(--line-strong);opacity:0.45;cursor:not-allowed;">Share screen</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,108px);gap:12px;margin-top:10px;">
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em;">rest</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em;">hover</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em;">disabled</span>
  </div>
</div></body></html>
