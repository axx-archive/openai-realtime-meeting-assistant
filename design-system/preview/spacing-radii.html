<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <span class="label">Radii</span>
  <div style="display:flex;gap:18px;margin-top:18px;align-items:flex-end;">
    
      <div style="display:grid;gap:8px;justify-items:center;">
        <div style="width:60px;height:60px;background:rgba(255,235,200,0.06);border:1px solid var(--line-strong);border-radius:4px;"></div>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em;">xs</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);">4px</span>
      </div>
      <div style="display:grid;gap:8px;justify-items:center;">
        <div style="width:60px;height:60px;background:rgba(255,235,200,0.06);border:1px solid var(--line-strong);border-radius:6px;"></div>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em;">sm</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);">6px</span>
      </div>
      <div style="display:grid;gap:8px;justify-items:center;">
        <div style="width:60px;height:60px;background:rgba(255,235,200,0.06);border:1px solid var(--line-strong);border-radius:10px;"></div>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em;">md</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);">10px</span>
      </div>
      <div style="display:grid;gap:8px;justify-items:center;">
        <div style="width:60px;height:60px;background:rgba(255,235,200,0.06);border:1px solid var(--line-strong);border-radius:14px;"></div>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em;">lg</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);">14px</span>
      </div>
      <div style="display:grid;gap:8px;justify-items:center;">
        <div style="width:80px;height:60px;background:rgba(255,235,200,0.06);border:1px solid var(--line-strong);border-radius:999px;"></div>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em;">pill</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);">999</span>
      </div>
  </div>
</div></body></html>
