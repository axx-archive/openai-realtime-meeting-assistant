<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Semantic</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <span class="label">Semantic</span>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;">
    <div style="display:grid;gap:6px;"><div style="height:54px;border-radius:10px;background:#5FBE7A;"></div><div style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--fg-2);">success</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);">#5FBE7A</div></div>
    <div style="display:grid;gap:6px;"><div style="height:54px;border-radius:10px;background:#FFB23F;"></div><div style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--fg-2);">warning</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);">#FFB23F</div></div>
    <div style="display:grid;gap:6px;"><div style="height:54px;border-radius:10px;background:#E5573E;"></div><div style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--fg-2);">danger</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);">#E5573E</div></div>
    <div style="display:grid;gap:6px;"><div style="height:54px;border-radius:10px;background:#88A8FF;"></div><div style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--fg-2);">info</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);">#88A8FF</div></div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-3);">all four pulled toward warm · never saturated</div>
</div></body></html>
