<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Ember glow</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <span class="label">Ember glow · the room is listening</span>
  <div style="display:flex;gap:36px;margin-top:24px;align-items:center;">
    <div style="display:grid;gap:10px;justify-items:center;">
      <div style="width:88px;height:40px;background:var(--night-3);border-radius:6px;box-shadow:0 0 0 1px rgba(255,122,43,0.45), 0 0 16px rgba(255,122,43,0.25);"></div>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);">--glow-ember-sm</span>
      <span style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3);">focus ring</span>
    </div>
    <div style="display:grid;gap:10px;justify-items:center;">
      <div style="width:88px;height:40px;background:var(--night-3);border-radius:6px;box-shadow:0 0 0 1px rgba(255,122,43,0.55), 0 0 28px rgba(255,122,43,0.35), 0 0 64px rgba(255,122,43,0.15);"></div>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);">--glow-ember-md</span>
      <span style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3);">listening / moved card</span>
    </div>
  </div>
