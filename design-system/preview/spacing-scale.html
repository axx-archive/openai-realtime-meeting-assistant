<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Spacing</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <span class="label">Spacing scale</span>
  <div style="display:grid;gap:10px;margin-top:14px;">
    
      <div style="display:grid;grid-template-columns:60px 4px 1fr;align-items:center;gap:12px;">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);">--s-1</span>
        <span style="height:8px;background:var(--ember-500);border-radius:2px;"></span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-1);">4px</span>
      </div>
      <div style="display:grid;grid-template-columns:60px 8px 1fr;align-items:center;gap:12px;">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);">--s-2</span>
        <span style="height:8px;background:var(--ember-500);border-radius:2px;"></span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-1);">8px</span>
      </div>
      <div style="display:grid;grid-template-columns:60px 12px 1fr;align-items:center;gap:12px;">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);">--s-3</span>
        <span style="height:8px;background:var(--ember-500);border-radius:2px;"></span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-1);">12px</span>
      </div>
      <div style="display:grid;grid-template-columns:60px 16px 1fr;align-items:center;gap:12px;">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);">--s-4</span>
        <span style="height:8px;background:var(--ember-500);border-radius:2px;"></span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-1);">16px</span>
      </div>
      <div style="display:grid;grid-template-columns:60px 20px 1fr;align-items:center;gap:12px;">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);">--s-5</span>
        <span style="height:8px;background:var(--ember-500);border-radius:2px;"></span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-1);">20px</span>
      </div>
      <div style="display:grid;grid-template-columns:60px 24px 1fr;align-items:center;gap:12px;">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);">--s-6</span>
        <span style="height:8px;background:var(--ember-500);border-radius:2px;"></span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-1);">24px</span>
      </div>
      <div style="display:grid;grid-template-columns:60px 32px 1fr;align-items:center;gap:12px;">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);">--s-7</span>
        <span style="height:8px;background:var(--ember-500);border-radius:2px;"></span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-1);">32px</span>
      </div>
      <div style="display:grid;grid-template-columns:60px 48px 1fr;align-items:center;gap:12px;">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);">--s-8</span>
        <span style="height:8px;background:var(--ember-500);border-radius:2px;"></span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-1);">48px</span>
      </div>
  </div>
</div></body></html>
