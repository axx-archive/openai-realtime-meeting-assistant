<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Shadows · dark</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <span class="label">Shadows · dark elevation</span>
  <div style="display:flex;gap:24px;margin-top:24px;">
    
      <div style="display:grid;gap:10px;justify-items:center;">
        <div style="width:88px;height:60px;background:var(--night-3);border:1px solid var(--line-strong);border-radius:10px;box-shadow:0 1px 2px rgba(15,8,2,0.45);"></div>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);">--shadow-1</span>
      </div>
      <div style="display:grid;gap:10px;justify-items:center;">
        <div style="width:88px;height:60px;background:var(--night-3);border:1px solid var(--line-strong);border-radius:10px;box-shadow:0 6px 18px rgba(15,8,2,0.45), 0 1px 2px rgba(15,8,2,0.55);"></div>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);">--shadow-2</span>
      </div>
      <div style="display:grid;gap:10px;justify-items:center;">
        <div style="width:88px;height:60px;background:var(--night-3);border:1px solid var(--line-strong);border-radius:10px;box-shadow:0 24px 60px rgba(15,8,2,0.55), 0 4px 12px rgba(15,8,2,0.45);"></div>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);">--shadow-3</span>
      </div>
  </div>
</div></body></html>
