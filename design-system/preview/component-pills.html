<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Pills · status</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <span class="label">Status pills</span>
  <div style="display:flex;flex-direction:column;gap:10px;margin-top:14px;align-items:flex-start;">
    <span style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;font-family:var(--font-sans);font-size:12px;font-weight:500;line-height:1;background:var(--night-3);color:var(--fg-1);white-space:nowrap;">
  <span style="width:7px;height:7px;border-radius:999px;background:var(--fg-3);"></span>not connected</span>
    <span style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;font-family:var(--font-sans);font-size:12px;font-weight:500;line-height:1;background:rgba(136, 168, 255, 0.14);color:#88A8FF;white-space:nowrap;">
  <span style="width:7px;height:7px;border-radius:999px;background:#88A8FF;"></span>connecting…</span>
    <span style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;font-family:var(--font-sans);font-size:12px;font-weight:500;line-height:1;background:var(--success-bg);color:var(--success);white-space:nowrap;">
  <span style="width:7px;height:7px;border-radius:999px;background:var(--success);"></span>room connected</span>
    <span style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;font-family:var(--font-sans);font-size:12px;font-weight:500;line-height:1;background:rgba(255,122,43,0.12);color:var(--ember-300);white-space:nowrap;">
  <span style="width:7px;height:7px;border-radius:999px;background:var(--ember-500);box-shadow:0 0 8px var(--ember-500);"></span>the room is listening</span>
    <span style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;font-family:var(--font-sans);font-size:12px;font-weight:500;line-height:1;background:var(--danger-bg);color:var(--danger);white-space:nowrap;">
  <span style="width:7px;height:7px;border-radius:999px;background:var(--danger);"></span>assistant offline</span>
  </div>
</div></body></html>
