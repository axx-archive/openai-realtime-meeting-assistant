<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Assistant message</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <span class="label">Assistant feed</span>
  <div style="display:grid;gap:8px;margin-top:14px;max-width:420px;">
    <article style="display:grid;gap:6px;border:1px solid var(--line-faint);border-radius:6px;background:rgba(255,235,200,0.04);box-shadow:inset 0 1px 0 rgba(255,255,255,0.025), 0 8px 22px rgba(0,0,0,0.12);color:var(--fg-0);padding:8px 12px;font-size:12px;line-height:1.5;">
      <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-2);">status · 10:47</span>
      <span>waiting for room audio.</span>
    </article>
    <article style="display:grid;gap:6px;border:1px solid rgba(255,122,43,0.28);border-radius:6px;background:rgba(255,122,43,0.10);color:var(--fg-0);padding:8px 12px;font-size:12px;line-height:1.5;">
      <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ember-300);">action · 10:48</span>
      <span>moved Implement ICE Restart Handling to In Progress.</span>
      <a style="justify-self:start;color:var(--ember-300);font-size:12px;font-weight:600;text-decoration:none;">Download archive</a>
    </article>
    <article style="display:grid;gap:6px;border:1px solid rgba(229,87,62,0.34);border-radius:6px;background:var(--danger-bg);color:var(--fg-0);padding:8px 12px;font-size:12px;line-height:1.5;">
      <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--danger);">error · 10:49</span>
      <span>join the room before asking the assistant.</span>
    </article>
  </div>
</div></body></html>
