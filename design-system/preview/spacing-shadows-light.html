<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Shadows · light</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card card--parchment">
  <span class="label label--inv">Shadows · parchment elevation</span>
  <div style="display:flex;gap:32px;margin-top:24px;">
    <div style="display:grid;gap:10px;justify-items:center;">
      <div style="width:88px;height:60px;background:#FFF;border:1px solid var(--line-light);border-radius:10px;box-shadow:0 1px 2px rgba(60,35,10,0.06);"></div>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--ash-600);">--shadow-light-1</span>
    </div>
    <div style="display:grid;gap:10px;justify-items:center;">
      <div style="width:88px;height:60px;background:#FFF;border:1px solid var(--line-light);border-radius:10px;box-shadow:0 8px 24px rgba(60,35,10,0.10), 0 1px 2px rgba(60,35,10,0.06);"></div>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--ash-600);">--shadow-light-2</span>
    </div>
  </div>
  <div style="margin-top:16px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ash-600);">brown-tinted · never grey</div>
</div></body></html>
