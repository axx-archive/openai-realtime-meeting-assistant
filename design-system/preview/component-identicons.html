<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Identicon avatars</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <span class="label">Owner identicons · warm-clamped, 5×5 mirrored</span>
  <div id="grid" style="display:flex;gap:14px;margin-top:18px;align-items:center;"></div>
  <div style="margin-top:14px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-3);">hue 18°–60° · sat 60–80% · lit 26–40%</div>
  <script>
    function hashString(v){let h=2166136261;for(const c of String(v||'')){h^=c.charCodeAt(0);h=Math.imul(h,16777619)}return h>>>0}
    function identicon(seed,size){
      const svgNS='http://www.w3.org/2000/svg';
      const wrap=document.createElement('span');
      wrap.style.cssText='display:inline-grid;place-items:center;overflow:hidden;width:'+size+'px;height:'+size+'px;border:'+(size>32?3:2)+'px solid #FFF;border-radius:999px;background:#F6F8FA;box-shadow:0 0 0 1px rgba(27,19,10,0.18);flex-shrink:0;';
      const svg=document.createElementNS(svgNS,'svg');
      svg.setAttribute('viewBox','0 0 5 5');
      svg.style.cssText='display:block;width:100%;height:100%;';
      const bg=document.createElementNS(svgNS,'rect');bg.setAttribute('width','5');bg.setAttribute('height','5');bg.setAttribute('fill','#F6F8FA');svg.appendChild(bg);
      const hue=18+(hashString(seed+':hue')%42), sat=60+(hashString(seed+':sat')%20), lit=26+(hashString(seed+':lit')%14);
      const color='hsl('+hue+' '+sat+'% '+lit+'%)';
      const p=hashString(seed+':pattern');
      let filled=0;
      for(let y=0;y<5;y++)for(let x=0;x<3;x++){const b=y*3+x;if(((p>>>b)&1)===0)continue;
        const r=document.createElementNS(svgNS,'rect');r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width','1');r.setAttribute('height','1');r.setAttribute('fill',color);svg.appendChild(r);filled++;
        if(x!==2){const r2=document.createElementNS(svgNS,'rect');r2.setAttribute('x',4-x);r2.setAttribute('y',y);r2.setAttribute('width','1');r2.setAttribute('height','1');r2.setAttribute('fill',color);svg.appendChild(r2);}
      }
      if(!filled){const r=document.createElementNS(svgNS,'rect');r.setAttribute('x','2');r.setAttribute('y','2');r.setAttribute('width','1');r.setAttribute('height','1');r.setAttribute('fill',color);svg.appendChild(r);}
      wrap.appendChild(svg);return wrap;
    }
    const grid=document.getElementById('grid');
    ['Tim','Erick','Tyler','Jake','Caitlyn','AJ','Joel','Tom'].forEach(n=>{
      const col=document.createElement('div');col.style.cssText='display:grid;gap:6px;justify-items:center;';
      col.appendChild(identicon(n,44));
      const lbl=document.createElement('span');lbl.textContent=n;lbl.style.cssText='font-family:var(--font-mono);font-size:10px;color:var(--fg-2);letter-spacing:0.06em;';
      col.appendChild(lbl);grid.appendChild(col);
    });
  </script>
</div></body></html>
