<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Toasts</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <span class="label">Toasts · bottom-right tray</span>
  <div style="display:grid;gap:10px;margin-top:14px;max-width:360px;">
    
      <div style="border:1px solid var(--line-strong);border-radius:10px;background:var(--night-3);box-shadow:0 6px 18px rgba(15,8,2,0.45), 0 1px 2px rgba(15,8,2,0.55);color:var(--fg-0);font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:1.35;padding:12px;display:grid;grid-template-columns:4px 1fr;gap:12px;align-items:center;">
        <span style="width:4px;height:22px;border-radius:999px;background:#FF7A2B;"></span>
        <span>new card · Add Simulcast Forwarding Controls → Backlog</span>
      </div>
      <div style="border:1px solid var(--line-strong);border-radius:10px;background:var(--night-3);box-shadow:0 6px 18px rgba(15,8,2,0.45), 0 1px 2px rgba(15,8,2,0.55);color:var(--fg-0);font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:1.35;padding:12px;display:grid;grid-template-columns:4px 1fr;gap:12px;align-items:center;">
        <span style="width:4px;height:22px;border-radius:999px;background:#5FBE7A;"></span>
        <span>meeting archive ready</span>
      </div>
      <div style="border:1px solid var(--line-strong);border-radius:10px;background:var(--night-3);box-shadow:0 6px 18px rgba(15,8,2,0.45), 0 1px 2px rgba(15,8,2,0.55);color:var(--fg-0);font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:1.35;padding:12px;display:grid;grid-template-columns:4px 1fr;gap:12px;align-items:center;">
        <span style="width:4px;height:22px;border-radius:999px;background:#88A8FF;"></span>
        <span>meeting notes generated</span>
      </div>
      <div style="border:1px solid rgba(229,87,62,0.4);border-radius:10px;background:var(--night-3);box-shadow:0 6px 18px rgba(15,8,2,0.45), 0 1px 2px rgba(15,8,2,0.55);color:var(--fg-0);font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:1.35;padding:12px;display:grid;grid-template-columns:4px 1fr;gap:12px;align-items:center;">
        <span style="width:4px;height:22px;border-radius:999px;background:#E5573E;"></span>
        <span>notes generated, email failed</span>
      </div>
  </div>
</div></body></html>
